<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Timbre">
<title>Timbre</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #f6f5f2;
  --card:     #ffffff;
  --card2:    #f0efea;
  --border:   #e5e3db;
  --text:     #17160f;
  --muted:    #888580;
  --faint:    #c5c2b8;
  --shadow:   0 1px 3px rgba(0,0,0,0.05), 0 4px 14px rgba(0,0,0,0.04);
  --green:    #1e6f45;
  --green-l:  #d6f0e2;
  --red:      #b83030;
  --red-l:    #fde4e4;
  --yellow:   #946c00;
  --yellow-l: #fef3c7;
  --blue:     #1a5c9e;
  --blue-l:   #deeaf8;
  --purple:   #6b3491;
  --purple-l: #f0e4f8;
  --grey-l:   #f0efeb;
  --radius:   10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100dvh;
  padding: env(safe-area-inset-top,0) env(safe-area-inset-right,0) env(safe-area-inset-bottom,0) env(safe-area-inset-left,0);
  -webkit-font-smoothing: antialiased;
}
.app { max-width: 480px; margin: 0 auto; padding: 20px 16px 72px; }

/* ── HEADER ── */
.topbar {
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 20px;
}
.logo { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
.logo span { color: var(--green); }
.month-nav {
  display: flex; align-items: center; gap: 2px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 3px 5px; box-shadow: var(--shadow);
}
.month-nav button {
  background: none; border: none; color: var(--muted);
  width: 26px; height: 26px; border-radius: 50%;
  cursor: pointer; font-size: 12px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.12s;
}
.month-nav button:hover { background: var(--bg); color: var(--text); }
#monthLabel { font-size: 12px; font-weight: 500; min-width: 80px; text-align: center; }

/* ── TABS ── */
.tabs {
  display: flex; background: var(--card);
  border: 1px solid var(--border); border-radius: 8px;
  padding: 3px; margin-bottom: 18px; box-shadow: var(--shadow);
}
.tab {
  flex: 1; text-align: center; padding: 7px 4px;
  border-radius: 6px; font-size: 11px; font-weight: 500;
  color: var(--muted); cursor: pointer; transition: all 0.12s;
  letter-spacing: 0.3px; text-transform: uppercase;
}
.tab.active { background: var(--text); color: var(--bg); }

.section { display: none; }
.section.active { display: block; }

/* ── BALANCE BAR ── */
.balance-bar {
  display: flex; gap: 8px; margin-bottom: 14px;
}
.bal-card {
  flex: 1; background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 12px;
  box-shadow: var(--shadow);
}
.bal-card.pos-card { border-top: 2px solid var(--green); }
.bal-card.neg-card { border-top: 2px solid var(--red); background: var(--red-l); border-color: var(--red); }
.bal-label { font-size: 9px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--faint); margin-bottom: 4px; }
.bal-value {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 24px; font-weight: 500; line-height: 1;
  color: var(--text);
}
.bal-card.neg-card .bal-value { color: var(--red); }
.bal-sub { font-size: 10px; color: var(--muted); margin-top: 3px; font-weight: 300; }

/* ── LOG FORM ── */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
  margin-bottom: 12px; box-shadow: var(--shadow);
}
.card-label {
  font-size: 9px; font-weight: 600; letter-spacing: 1.4px;
  text-transform: uppercase; color: var(--faint); margin-bottom: 12px;
}

.date-row { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }

input[type="date"], input[type="time"], input[type="number"] {
  background: var(--card2); border: 1px solid var(--border);
  border-radius: 7px; color: var(--text);
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 13px; padding: 8px 10px; outline: none;
  -webkit-appearance: none; transition: border-color 0.15s, box-shadow 0.15s;
}
input[type="date"]:focus, input[type="time"]:focus, input[type="number"]:focus {
  border-color: var(--green); box-shadow: 0 0 0 2px rgba(30,111,69,0.1);
}
input[type="date"]::-webkit-calendar-picker-indicator,
input[type="time"]::-webkit-calendar-picker-indicator { opacity: 0.3; cursor: pointer; }
#entryDate { flex: 1; }

.pill-btn {
  background: var(--card2); border: 1px solid var(--border);
  color: var(--muted); font-family: 'IBM Plex Sans', sans-serif;
  font-size: 11px; font-weight: 500; padding: 8px 11px;
  border-radius: 7px; cursor: pointer; transition: all 0.12s;
  white-space: nowrap;
}
.pill-btn:hover { background: var(--text); color: var(--bg); border-color: var(--text); }

/* day type selector */
.day-type-row {
  display: grid; grid-template-columns: repeat(4,1fr);
  gap: 6px; margin-bottom: 12px;
}
.dtype-btn {
  border: 1.5px solid var(--border); border-radius: 7px;
  padding: 8px 4px; text-align: center; cursor: pointer;
  transition: all 0.12s; background: var(--card2);
  font-size: 11px; font-weight: 500; color: var(--muted);
  line-height: 1.3;
}
.dtype-btn .di { font-size: 14px; display: block; margin-bottom: 3px; }
.dtype-btn.active-work    { border-color: var(--green);  background: var(--green-l);  color: var(--green); }
.dtype-btn.active-leave   { border-color: var(--purple); background: var(--purple-l); color: var(--purple); }
.dtype-btn.active-pto     { border-color: var(--blue);   background: var(--blue-l);   color: var(--blue); }
.dtype-btn.active-holiday { border-color: var(--yellow); background: var(--yellow-l); color: var(--yellow); }

/* work fields / leave fields */
.fields-work, .fields-leave { margin-bottom: 12px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.field-block label {
  display: block; font-size: 9px; font-weight: 600;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 4px;
}
.field-block input[type="time"] { width: 100%; font-size: 18px; padding: 9px 10px; }
.field-block input[type="number"] { width: 100%; }

.entry-note {
  font-size: 11px; color: var(--muted); min-height: 16px;
  margin-bottom: 12px; transition: color 0.15s;
}
.entry-note.ok   { color: var(--green); }
.entry-note.warn { color: var(--yellow); }
.entry-note.err  { color: var(--red); }

.save-btn {
  width: 100%; background: var(--text); color: var(--bg);
  border: none; border-radius: 7px;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 13px; font-weight: 600; padding: 12px;
  cursor: pointer; transition: all 0.15s;
  letter-spacing: 0.2px;
}
.save-btn:hover { background: var(--green); }

/* ── LOG LIST ── */
.sdiv {
  font-size: 9px; font-weight: 600; letter-spacing: 1.4px;
  text-transform: uppercase; color: var(--faint);
  margin: 18px 0 8px; display: flex; align-items: center; gap: 8px;
}
.sdiv::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.log-list { display: flex; flex-direction: column; gap: 5px; }
.log-entry {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 9px; padding: 11px 13px;
  display: grid; grid-template-columns: 36px 1fr auto 24px;
  align-items: center; gap: 10px;
  box-shadow: var(--shadow); transition: border-color 0.12s;
}
.log-entry.is-today  { border-left: 2px solid var(--green); }
.log-entry.is-weekend { background: var(--grey-l); }
.log-entry.is-pto    { border-left: 2px solid var(--blue); }
.log-entry.is-leave  { border-left: 2px solid var(--purple); }
.log-entry.is-holiday{ border-left: 2px solid var(--yellow); }

.le-day { text-align: center; }
.le-daynum {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 17px; font-weight: 500; line-height: 1;
}
.le-dayname { font-size: 8px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--faint); margin-top: 1px; }
.le-weekend .le-daynum, .le-weekend .le-dayname { color: var(--faint); }

.le-info {}
.le-times { font-size: 12px; color: var(--text); }
.le-times span { color: var(--faint); margin: 0 2px; }
.le-meta  { font-size: 10px; color: var(--muted); margin-top: 1px; }
.le-type-badge {
  display: inline-block; font-size: 9px; font-weight: 600;
  padding: 1px 6px; border-radius: 3px; margin-top: 2px; letter-spacing: 0.3px;
}
.badge-pto     { background: var(--blue-l);   color: var(--blue); }
.badge-leave   { background: var(--purple-l); color: var(--purple); }
.badge-holiday { background: var(--yellow-l); color: var(--yellow); }

.le-running { font-size: 10px; color: var(--muted); margin-top: 1px; }
.le-running.pos { color: var(--green); }
.le-running.neg { color: var(--red); }

.le-delta {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px; font-weight: 500; text-align: right;
}
.le-delta.pos { color: var(--green); }
.le-delta.neg { color: var(--red); }
.le-delta.zer { color: var(--muted); }

.le-del {
  background: none; border: none; color: var(--faint);
  cursor: pointer; font-size: 11px; width: 22px; height: 22px;
  border-radius: 4px; display: flex; align-items: center; justify-content: center;
  transition: all 0.12s;
}
.le-del:hover { background: var(--red-l); color: var(--red); }

/* ── OVERVIEW (month grid) ── */
.month-grid {
  display: grid; grid-template-columns: repeat(7,1fr);
  gap: 4px; margin-bottom: 16px;
}
.mg-header {
  text-align: center; font-size: 9px; font-weight: 600;
  letter-spacing: 0.8px; text-transform: uppercase;
  color: var(--faint); padding: 4px 0;
}
.mg-day {
  aspect-ratio: 1; border-radius: 6px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-size: 12px; font-weight: 500; cursor: default;
  border: 1px solid transparent; transition: all 0.12s; position: relative;
}
.mg-day.empty { background: transparent; border-color: transparent; }
.mg-day.weekend { background: var(--grey-l); color: var(--faint); border-color: var(--border); }
.mg-day.future  { background: var(--card); color: var(--faint); border-color: var(--border); }
.mg-day.green   { background: var(--green-l);  color: var(--green);  border-color: #b2dfc7; }
.mg-day.red     { background: var(--red-l);    color: var(--red);    border-color: #f5c0c0; }
.mg-day.yellow  { background: var(--yellow-l); color: var(--yellow); border-color: #fde89e; }
.mg-day.blue    { background: var(--blue-l);   color: var(--blue);   border-color: #b8d6f4; }
.mg-day.holiday { background: var(--yellow-l); color: var(--yellow); border-color: #fde89e; }
.mg-day.today-ring { outline: 2px solid var(--text); outline-offset: 1px; }
.mg-dot { width: 4px; height: 4px; border-radius: 50%; margin-top: 2px; background: currentColor; opacity: 0.5; }

.ov-legend { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
.leg-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--muted); }
.leg-dot { width: 10px; height: 10px; border-radius: 3px; }

/* ── HOLIDAYS TAB ── */
.hol-counters {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; margin-bottom: 14px;
}
.hol-counter {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 12px;
  box-shadow: var(--shadow);
}
.hol-counter.pto-card   { border-top: 2px solid var(--blue); }
.hol-counter.leave-card { border-top: 2px solid var(--purple); }
.hc-label { font-size: 9px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--faint); margin-bottom: 4px; }
.hc-value {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 28px; font-weight: 500; line-height: 1;
}
.hol-counter.pto-card   .hc-value { color: var(--blue); }
.hol-counter.leave-card .hc-value { color: var(--purple); }
.hc-sub { font-size: 10px; color: var(--muted); margin-top: 3px; font-weight: 300; }

.hol-set-card { margin-bottom: 14px; }
.hol-set-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.hol-set-row label { font-size: 12px; font-weight: 500; flex: 1; }
.hol-set-row input { width: 70px; text-align: center; }
.hol-set-row .hol-unit { font-size: 11px; color: var(--muted); }

.hol-used-list { margin-top: 4px; }
.hol-used-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 0; border-bottom: 1px solid var(--border);
  font-size: 12px;
}
.hol-used-item:last-child { border-bottom: none; }
.hui-date { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); min-width: 70px; }
.hui-type { font-size: 10px; font-weight: 600; padding: 1px 7px; border-radius: 3px; }
.hui-hrs  { font-family: 'IBM Plex Mono', monospace; font-size: 12px; margin-left: auto; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(70px);
  background: var(--text); color: var(--bg);
  border-radius: 20px; padding: 9px 20px;
  font-size: 12px; font-weight: 500;
  transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1);
  white-space: nowrap; z-index: 999; pointer-events: none;
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.ok  { background: var(--green); }
.toast.err { background: var(--red); }

.empty-state { text-align: center; padding: 36px 20px; color: var(--faint); font-size: 12px; }
.empty-state .ei { font-size: 26px; margin-bottom: 8px; opacity: 0.35; }
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="logo">timbre<span>.</span></div>
    <div class="month-nav">
      <button id="prevMonth">&#8592;</button>
      <div id="monthLabel"></div>
      <button id="nextMonth">&#8594;</button>
    </div>
  </div>

  <!-- BALANCE BAR -->
  <div class="balance-bar">
    <div class="bal-card" id="balCard">
      <div class="bal-label">Monthly balance</div>
      <div class="bal-value" id="balValue">+0:00</div>
      <div class="bal-sub" id="balSub">0 days logged</div>
    </div>
    <div class="bal-card" id="runCard">
      <div class="bal-label">Running total</div>
      <div class="bal-value" id="runValue">+0:00</div>
      <div class="bal-sub" id="runSub">cumulative</div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" data-tab="log">Log</div>
    <div class="tab" data-tab="overview">Overview</div>
    <div class="tab" data-tab="holidays">Holidays</div>
  </div>

  <!-- ── LOG TAB ── -->
  <div class="section active" id="tab-log">

    <div class="card">
      <div class="card-label">Entry</div>

      <div class="date-row">
        <input type="date" id="entryDate">
        <button class="pill-btn" id="todayBtn">Today</button>
      </div>

      <!-- Day type -->
      <div class="day-type-row">
        <div class="dtype-btn active-work" data-type="work">
          <span class="di">🕐</span>Work
        </div>
        <div class="dtype-btn" data-type="leave">
          <span class="di">🌿</span>Leave
        </div>
        <div class="dtype-btn" data-type="pto">
          <span class="di">🏖️</span>PTO
        </div>
        <div class="dtype-btn" data-type="holiday">
          <span class="di">🎉</span>Holiday
        </div>
      </div>

      <!-- Work fields -->
      <div class="fields-work" id="fieldsWork">
        <div class="field-row">
          <div class="field-block">
            <label>Start</label>
            <input type="time" id="startTime" value="09:00">
          </div>
          <div class="field-block">
            <label>End</label>
            <input type="time" id="endTime" value="17:20">
          </div>
        </div>
        <div class="field-row" style="grid-template-columns:1fr; margin-bottom:0;">
          <div class="field-block">
            <label>Leave of absence (hrs, 0 if none)</label>
            <input type="number" id="leaveHrs" value="0" min="0" max="8" step="0.5" style="width:100%;">
          </div>
        </div>
      </div>

      <!-- Leave-only fields -->
      <div class="fields-leave" id="fieldsLeave" style="display:none;">
        <div class="field-block">
          <label>Hours of Leave of absence (1–8)</label>
          <input type="number" id="leaveOnlyHrs" value="4" min="1" max="8" step="0.5" style="width:100%; margin-top:4px;">
        </div>
      </div>

      <div class="entry-note" id="entryNote">—</div>
      <button class="save-btn" id="saveBtn">Save</button>
    </div>

    <div class="sdiv" id="logSdiv">This month</div>
    <div class="log-list" id="logList"></div>
  </div>

  <!-- ── OVERVIEW TAB ── -->
  <div class="section" id="tab-overview">
    <div class="ov-legend">
      <div class="leg-item"><div class="leg-dot" style="background:var(--green-l); border:1px solid #b2dfc7;"></div> Positive</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--red-l);   border:1px solid #f5c0c0;"></div> Negative</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--yellow-l);border:1px solid #fde89e;"></div> Even / Holiday</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--blue-l);  border:1px solid #b8d6f4;"></div> PTO</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--grey-l);  border:1px solid var(--border);"></div> Weekend</div>
    </div>
    <div class="month-grid" id="monthGrid"></div>

    <div class="sdiv">Summary</div>
    <div id="ovSummary"></div>
  </div>

  <!-- ── HOLIDAYS TAB ── -->
  <div class="section" id="tab-holidays">
    <div class="hol-counters">
      <div class="hol-counter pto-card">
        <div class="hc-label">PTO remaining</div>
        <div class="hc-value" id="ptoRemain">—</div>
        <div class="hc-sub">full days off</div>
      </div>
      <div class="hol-counter leave-card">
        <div class="hc-label">Leave remaining</div>
        <div class="hc-value" id="leaveRemain">—</div>
        <div class="hc-sub">hours</div>
      </div>
    </div>

    <div class="card hol-set-card">
      <div class="card-label">Set allowance</div>
      <div class="hol-set-row">
        <label>PTO days total</label>
        <input type="number" id="ptoBudget" min="0" max="60" step="1" value="0">
        <span class="hol-unit">days</span>
      </div>
      <div class="hol-set-row">
        <label>Leave of absence hours total</label>
        <input type="number" id="leaveBudget" min="0" max="200" step="1" value="0">
        <span class="hol-unit">hrs</span>
      </div>
      <button class="save-btn" id="saveBudgetBtn">Save allowance</button>
    </div>

    <div class="sdiv">Used this year</div>
    <div class="hol-used-list" id="holUsedList"></div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
const DAILY = 500; // 8h20m in minutes
const DAYS  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS= ['January','February','March','April','May','June','July','August','September','October','November','December'];

// Data
let entries  = {}; // key: YYYY-MM-DD → { type:'work'|'leave'|'pto'|'holiday', start?, end?, leaveHrs?, leaveOnlyHrs? }
let budget   = { pto: 0, leave: 0 }; // hours budget
let currentYear, currentMonth;
let currentType = 'work';

/* ── INIT ── */
function init() {
  const now = new Date();
  currentYear  = now.getFullYear();
  currentMonth = now.getMonth();
  load();
  document.getElementById('entryDate').value = fmt(now);
  setupListeners();
  prefillDate(fmt(now));
  updateNote();
  render();
}

function fmt(d)  { return d.toISOString().slice(0,10); }
function today() { return fmt(new Date()); }
function isWeekend(dateStr) { const d = new Date(dateStr+'T00:00:00'); return d.getDay()===0||d.getDay()===6; }

function load() {
  try { const r=localStorage.getItem('timbre3_entries'); if(r) entries=JSON.parse(r); } catch(e){}
  try { const b=localStorage.getItem('timbre3_budget');  if(b) budget =JSON.parse(b); } catch(e){}
  document.getElementById('ptoBudget').value   = budget.pto;
  document.getElementById('leaveBudget').value = budget.leave;
}
function saveEntries() { localStorage.setItem('timbre3_entries', JSON.stringify(entries)); }
function saveBudget()  { localStorage.setItem('timbre3_budget',  JSON.stringify(budget)); }

/* ── LISTENERS ── */
function setupListeners() {
  document.getElementById('todayBtn').addEventListener('click', () => {
    document.getElementById('entryDate').value = today();
    prefillDate(today());
    updateNote();
  });
  document.getElementById('entryDate').addEventListener('change', e => {
    prefillDate(e.target.value); updateNote();
  });
  document.getElementById('startTime').addEventListener('input', updateNote);
  document.getElementById('endTime').addEventListener('input', updateNote);
  document.getElementById('leaveHrs').addEventListener('input', updateNote);
  document.getElementById('leaveOnlyHrs').addEventListener('input', updateNote);
  document.getElementById('saveBtn').addEventListener('click', saveEntry);
  document.getElementById('saveBudgetBtn').addEventListener('click', () => {
    budget.pto   = parseFloat(document.getElementById('ptoBudget').value)||0;
    budget.leave = parseFloat(document.getElementById('leaveBudget').value)||0;
    saveBudget(); renderHolidays();
    showToast('Allowance saved','ok');
  });

  document.querySelectorAll('.dtype-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.dtype-btn').forEach(b => b.className='dtype-btn');
      btn.classList.add('active-'+btn.dataset.type);
      currentType = btn.dataset.type;
      showFields(currentType);
      updateNote();
    });
  });

  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
      document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      document.getElementById('tab-'+t.dataset.tab).classList.add('active');
      if(t.dataset.tab==='overview') renderOverview();
      if(t.dataset.tab==='holidays') renderHolidays();
    });
  });

  document.getElementById('prevMonth').addEventListener('click', () => {
    currentMonth--; if(currentMonth<0){currentMonth=11;currentYear--;} render();
  });
  document.getElementById('nextMonth').addEventListener('click', () => {
    currentMonth++; if(currentMonth>11){currentMonth=0;currentYear++;} render();
  });
}

function showFields(type) {
  document.getElementById('fieldsWork').style.display  = type==='work'  ? '' : 'none';
  document.getElementById('fieldsLeave').style.display = type==='leave' ? '' : 'none';
}

function prefillDate(date) {
  const e = entries[date];
  if(!e) return;
  // Set type
  currentType = e.type;
  document.querySelectorAll('.dtype-btn').forEach(b => {
    b.className = 'dtype-btn';
    if(b.dataset.type===e.type) b.classList.add('active-'+e.type);
  });
  showFields(e.type);
  if(e.type==='work') {
    if(e.start) document.getElementById('startTime').value = e.start;
    if(e.end)   document.getElementById('endTime').value   = e.end;
    document.getElementById('leaveHrs').value = e.leaveHrs||0;
  }
  if(e.type==='leave') {
    document.getElementById('leaveOnlyHrs').value = e.leaveOnlyHrs||4;
  }
}

/* ── COMPUTE DELTA ── */
// Returns { delta (mins), worked (mins), leaveUsed (hrs), ptoUsed (days), covered }
function computeEntry(e) {
  if(!e) return null;
  if(e.type==='pto')     return { delta:0, worked:DAILY, leaveUsed:0, ptoUsed:1, covered:true, label:'PTO (full day)' };
  if(e.type==='holiday') return { delta:0, worked:DAILY, leaveUsed:0, ptoUsed:0, covered:true, label:'Public Holiday' };
  if(e.type==='leave') {
    const lh = parseFloat(e.leaveOnlyHrs)||0;
    const lm = lh*60;
    const delta = lm - DAILY;
    return { delta, worked:lm, leaveUsed:lh, ptoUsed:0, covered: lm>=DAILY, label:`Leave ${lh}h` };
  }
  if(e.type==='work') {
    if(!e.start||!e.end) return null;
    const worked  = parseTime(e.end)-parseTime(e.start);
    const leaveMins = (parseFloat(e.leaveHrs)||0)*60;
    const total   = worked + leaveMins;
    const delta   = total - DAILY;
    return { delta, worked, leaveUsed: parseFloat(e.leaveHrs)||0, ptoUsed:0, covered: total>=DAILY,
      label: leaveMins>0 ? `${fmtDur(worked)} + ${e.leaveHrs}h leave` : fmtDur(worked) };
  }
  return null;
}

function parseTime(t) { if(!t) return 0; const [h,m]=t.split(':').map(Number); return h*60+m; }
function fmtMins(m) {
  const sign = m<0?'−':'+'; const a=Math.abs(m);
  return `${sign}${Math.floor(a/60)}:${String(a%60).padStart(2,'0')}`;
}
function fmtDur(m) {
  const h=Math.floor(m/60),mn=m%60;
  return mn===0 ? `${h}h` : `${h}h ${mn}m`;
}

/* ── UPDATE NOTE ── */
function updateNote() {
  const note = document.getElementById('entryNote');
  if(currentType==='pto') { note.textContent='Full day PTO — counts as 8h20m covered.'; note.className='entry-note ok'; return; }
  if(currentType==='holiday') { note.textContent='Public holiday — counts as covered.'; note.className='entry-note ok'; return; }
  if(currentType==='leave') {
    const lh=parseFloat(document.getElementById('leaveOnlyHrs').value)||0;
    if(lh<1||lh>8) { note.textContent='Leave must be between 1 and 8 hours.'; note.className='entry-note err'; return; }
    const lm=lh*60; const d=lm-DAILY;
    note.textContent=`${lh}h leave · ${fmtMins(d)} vs daily target`;
    note.className='entry-note '+(d>=0?'ok':'err'); return;
  }
  // work
  const s=document.getElementById('startTime').value;
  const e=document.getElementById('endTime').value;
  if(!s||!e) { note.textContent='Set start and end time.'; note.className='entry-note'; return; }
  const st=parseTime(s),et=parseTime(e);
  if(et<=st) { note.textContent='End must be after start.'; note.className='entry-note err'; return; }
  if(st<8*60||st>10*60) { note.textContent='⚠ Start outside 08:00–10:00 window'; note.className='entry-note warn'; return; }
  const worked=et-st;
  const lh=parseFloat(document.getElementById('leaveHrs').value)||0;
  const total=worked+lh*60;
  const d=total-DAILY;
  const leaveStr=lh>0?` + ${lh}h leave`:'';
  note.textContent=`${fmtDur(worked)}${leaveStr} · ${fmtMins(d)} today`;
  note.className='entry-note '+(d>=0?'ok':d>-30?'warn':'err');
}

/* ── SAVE ENTRY ── */
function saveEntry() {
  const date=document.getElementById('entryDate').value;
  if(!date) { showToast('Pick a date','err'); return; }
  let rec = { type: currentType };
  if(currentType==='work') {
    const s=document.getElementById('startTime').value;
    const e=document.getElementById('endTime').value;
    if(!s||!e) { showToast('Set start and end time','err'); return; }
    if(parseTime(e)<=parseTime(s)) { showToast('End must be after start','err'); return; }
    rec.start = s; rec.end = e;
    rec.leaveHrs = parseFloat(document.getElementById('leaveHrs').value)||0;
  }
  if(currentType==='leave') {
    const lh=parseFloat(document.getElementById('leaveOnlyHrs').value)||0;
    if(lh<1||lh>8) { showToast('Leave: 1–8 hours','err'); return; }
    rec.leaveOnlyHrs = lh;
  }
  entries[date]=rec;
  saveEntries();
  const [y,mo]=date.split('-').map(Number);
  currentYear=y; currentMonth=mo-1;
  render();
  showToast(entries[date]?'Saved':'Updated','ok');
}

function deleteEntry(date) {
  delete entries[date]; saveEntries(); render();
  showToast('Deleted','');
}

/* ── RENDER ── */
function render() {
  document.getElementById('monthLabel').textContent = MONTHS[currentMonth].slice(0,3)+' '+currentYear;
  renderBalance();
  renderLog();
  // re-render active tab content
  const activeTab = document.querySelector('.tab.active')?.dataset.tab;
  if(activeTab==='overview') renderOverview();
  if(activeTab==='holidays') renderHolidays();
}

function getMonthEntries() {
  const prefix=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
  return Object.entries(entries)
    .filter(([k])=>k.startsWith(prefix))
    .sort(([a],[b])=>a.localeCompare(b));
}

function renderBalance() {
  const me = getMonthEntries();
  let monthTotal=0;
  me.forEach(([,v])=>{ const c=computeEntry(v); if(c) monthTotal+=c.delta; });

  // Running (all entries up to end of current month)
  const monthEnd = new Date(currentYear,currentMonth+1,0);
  let runTotal=0;
  Object.entries(entries).sort(([a],[b])=>a.localeCompare(b)).forEach(([k,v])=>{
    const d=new Date(k+'T00:00:00');
    if(d<=monthEnd){ const c=computeEntry(v); if(c) runTotal+=c.delta; }
  });

  const balCard=document.getElementById('balCard');
  balCard.className='bal-card '+(monthTotal<0?'neg-card':'pos-card');
  document.getElementById('balValue').textContent=fmtMins(monthTotal);
  document.getElementById('balSub').textContent=`${me.length} day${me.length!==1?'s':''} · ${fmtDur(Math.abs(monthTotal))} ${monthTotal>=0?'ahead':'behind'}`;

  const runCard=document.getElementById('runCard');
  runCard.className='bal-card '+(runTotal<0?'neg-card':'pos-card');
  document.getElementById('runValue').textContent=fmtMins(runTotal);
  document.getElementById('runSub').textContent='all time';
}

function renderLog() {
  const list=document.getElementById('logList');
  document.getElementById('logSdiv').textContent=`${MONTHS[currentMonth]} ${currentYear}`;
  const me=getMonthEntries();
  if(!me.length){
    list.innerHTML=`<div class="empty-state"><div class="ei">○</div>No entries this month</div>`;
    return;
  }
  let running=0;
  const rows=me.map(([date,v])=>{
    const c=computeEntry(v);
    const delta=c?c.delta:0;
    running+=delta;
    return {date,v,c,delta,running};
  }).reverse();

  const todayStr=today();
  list.innerHTML='';
  rows.forEach(({date,v,c,delta,running})=>{
    const d=new Date(date+'T00:00:00');
    const wd=d.getDay(); const isWE=wd===0||wd===6;
    const el=document.createElement('div');
    let cls='log-entry';
    if(date===todayStr) cls+=' is-today';
    if(isWE) cls+=' is-weekend';
    if(v.type==='pto')     cls+=' is-pto';
    if(v.type==='leave')   cls+=' is-leave';
    if(v.type==='holiday') cls+=' is-holiday';
    el.className=cls;

    let badge='';
    if(v.type==='pto')     badge=`<span class="le-type-badge badge-pto">PTO</span>`;
    if(v.type==='leave')   badge=`<span class="le-type-badge badge-leave">Leave</span>`;
    if(v.type==='holiday') badge=`<span class="le-type-badge badge-holiday">Holiday</span>`;

    let timeHtml='';
    if(v.type==='work' && v.start && v.end)
      timeHtml=`<div class="le-times">${v.start}<span>→</span>${v.end}</div>`;

    const dClass=delta>0?'pos':delta<0?'neg':'zer';
    const rClass=running>0?'pos':running<0?'neg':'';
    el.innerHTML=`
      <div class="le-day ${isWE?'le-weekend':''}">
        <div class="le-daynum">${String(d.getDate()).padStart(2,'0')}</div>
        <div class="le-dayname">${DAYS[wd]}</div>
      </div>
      <div class="le-info">
        ${timeHtml}
        ${badge}
        ${c?`<div class="le-meta">${c.label}</div>`:''}
        <div class="le-running ${rClass}">running ${fmtMins(running)}</div>
      </div>
      <div class="le-delta ${dClass}">${fmtMins(delta)}</div>
      <button class="le-del" data-date="${date}">✕</button>`;
    list.appendChild(el);
  });
  list.querySelectorAll('.le-del').forEach(btn=>{
    btn.addEventListener('click', e=>{
      if(btn.dataset.confirming==='1') { deleteEntry(btn.dataset.date); }
      else {
        btn.dataset.confirming='1'; btn.textContent='?'; btn.style.background='var(--red-l)'; btn.style.color='var(--red)';
        setTimeout(()=>{ btn.dataset.confirming='0'; btn.textContent='✕'; btn.style=''; }, 2500);
      }
    });
  });
}

/* ── OVERVIEW ── */
function renderOverview() {
  const grid=document.getElementById('monthGrid');
  grid.innerHTML='';
  ['M','T','W','T','F','S','S'].forEach(d=>{
    const h=document.createElement('div'); h.className='mg-header'; h.textContent=d; grid.appendChild(h);
  });

  const firstDay=new Date(currentYear,currentMonth,1);
  const daysInMonth=new Date(currentYear,currentMonth+1,0).getDate();
  // Mon=0 offset
  let startOffset=(firstDay.getDay()+6)%7;
  for(let i=0;i<startOffset;i++){
    const e=document.createElement('div'); e.className='mg-day empty'; grid.appendChild(e);
  }

  const todayStr=today();
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow=new Date(dateStr+'T00:00:00').getDay();
    const isWE=dow===0||dow===6;
    const isFuture=dateStr>todayStr;
    const e=entries[dateStr];
    const c=e?computeEntry(e):null;

    const cell=document.createElement('div');
    let cls='mg-day';
    if(dateStr===todayStr) cls+=' today-ring';
    if(isWE && !e) { cls+=' weekend'; }
    else if(isFuture && !e) { cls+=' future'; }
    else if(e) {
      if(e.type==='pto')     cls+=' blue';
      else if(e.type==='holiday') cls+=' holiday';
      else if(c) {
        if(c.delta>0)       cls+=' green';
        else if(c.delta<0)  cls+=' red';
        else                cls+=' yellow';
      }
    } else if(isWE) { cls+=' weekend'; }
    else { cls+=' future'; }

    cell.className=cls;
    cell.innerHTML=`${d}${c||e?'<div class="mg-dot"></div>':''}`;
    grid.appendChild(cell);
  }

  // Summary
  const me=getMonthEntries();
  let pos=0,neg=0,even=0,pto=0,leave=0,holiday=0;
  me.forEach(([,v])=>{
    const c=computeEntry(v);
    if(!c) return;
    if(v.type==='pto')     pto++;
    else if(v.type==='holiday') holiday++;
    else if(c.delta>0) pos++;
    else if(c.delta<0) neg++;
    else even++;
    if(v.type==='leave'||v.leaveHrs) leave++;
  });
  document.getElementById('ovSummary').innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
      <div class="bal-card" style="border-top:2px solid var(--green);">
        <div class="bal-label">Positive days</div>
        <div class="bal-value" style="color:var(--green);">${pos}</div>
      </div>
      <div class="bal-card" style="border-top:2px solid var(--red);">
        <div class="bal-label">Negative days</div>
        <div class="bal-value" style="color:var(--red);">${neg}</div>
      </div>
      <div class="bal-card" style="border-top:2px solid var(--blue);">
        <div class="bal-label">PTO days</div>
        <div class="bal-value" style="color:var(--blue);">${pto}</div>
      </div>
      <div class="bal-card" style="border-top:2px solid var(--yellow);">
        <div class="bal-label">Holidays</div>
        <div class="bal-value" style="color:var(--yellow);">${holiday}</div>
      </div>
    </div>`;
}

/* ── HOLIDAYS ── */
function renderHolidays() {
  document.getElementById('ptoBudget').value   = budget.pto;
  document.getElementById('leaveBudget').value = budget.leave;

  // Count used PTO (days) and leave (hours) across ALL entries
  let usedPTO=0, usedLeave=0;
  const usedList=[];
  Object.entries(entries).sort(([a],[b])=>a.localeCompare(b)).forEach(([date,v])=>{
    const c=computeEntry(v);
    if(!c) return;
    if(v.type==='pto') {
      usedPTO+=1;
      usedList.push({date, type:'PTO', hrs:8, cls:'badge-pto'});
    }
    if(v.type==='leave') {
      usedLeave+=v.leaveOnlyHrs||0;
      usedList.push({date, type:'Leave', hrs:v.leaveOnlyHrs||0, cls:'badge-leave'});
    }
    if(v.type==='work' && v.leaveHrs>0) {
      usedLeave+=v.leaveHrs;
      usedList.push({date, type:'Leave', hrs:v.leaveHrs, cls:'badge-leave'});
    }
  });

  const remPTO   = budget.pto   - usedPTO;
  const remLeave = budget.leave - usedLeave;

  document.getElementById('ptoRemain').textContent   = budget.pto>0   ? remPTO+' / '+budget.pto   : '—';
  document.getElementById('leaveRemain').textContent = budget.leave>0 ? remLeave+'h / '+budget.leave+'h' : '—';

  const ul=document.getElementById('holUsedList');
  if(!usedList.length){
    ul.innerHTML=`<div class="empty-state" style="padding:20px 0;"><div class="ei">🌿</div>No PTO or leave used yet</div>`;
    return;
  }
  ul.innerHTML=usedList.map(u=>`
    <div class="hol-used-item">
      <span class="hui-date">${u.date}</span>
      <span class="le-type-badge ${u.cls}">${u.type}</span>
      <span class="hui-hrs">${u.hrs}h</span>
    </div>`).join('');
}

/* ── TOAST ── */
function showToast(msg,type) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+type;
  void t.offsetWidth; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

init();
</script>
