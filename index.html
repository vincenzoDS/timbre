<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Timbre">
<title>Timbre — Work Hours</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f5f0;
    --card: #ffffff;
    --border: #e8e4dc;
    --border2: #d4cfc4;
    --text: #1a1814;
    --muted: #9a9488;
    --faint: #c8c3b8;
    --accent: #2d6a4f;
    --accent-light: #e8f2ed;
    --pos: #2d6a4f;
    --neg: #c0392b;
    --warn: #b07d2a;
    --radius: 14px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
  }

  .app {
    max-width: 460px;
    margin: 0 auto;
    padding: 36px 20px 60px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    font-size: 22px;
    color: var(--text);
  }
  .logo-dot { color: var(--accent); }

  .month-nav {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 4px 6px;
    box-shadow: var(--shadow);
  }
  .month-nav button {
    background: none;
    border: none;
    color: var(--muted);
    width: 28px; height: 28px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .month-nav button:hover { background: var(--bg); color: var(--text); }
  #monthLabel {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    min-width: 88px;
    text-align: center;
  }

  .balance-card {
    background: var(--accent);
    border-radius: var(--radius);
    padding: 22px 24px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
    transition: background 0.3s;
  }
  .balance-card.neg-bg { background: #f5eded; border: 1px solid #e8d0d0; }
  .balance-card::after {
    content: '';
    position: absolute;
    bottom: -30px; right: -30px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    pointer-events: none;
  }

  .balance-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    margin-bottom: 6px;
  }
  .balance-card.neg-bg .balance-label { color: var(--neg); opacity: 0.6; }

  .balance-value {
    font-family: 'Playfair Display', serif;
    font-size: 52px;
    font-weight: 600;
    letter-spacing: -1px;
    line-height: 1;
    color: #fff;
  }
  .balance-card.neg-bg .balance-value { color: var(--neg); }

  .balance-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    margin-top: 8px;
    font-weight: 300;
  }
  .balance-card.neg-bg .balance-sub { color: var(--neg); opacity: 0.5; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
  }

  .card-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: var(--faint);
    margin-bottom: 16px;
  }

  .date-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }

  input[type="date"], input[type="time"] {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }
  input[type="date"]:focus, input[type="time"]:focus,
  input[type="date"]:hover, input[type="time"]:hover {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
  }
  input[type="date"]::-webkit-calendar-picker-indicator,
  input[type="time"]::-webkit-calendar-picker-indicator {
    opacity: 0.35; cursor: pointer;
  }

  #entryDate {
    font-size: 14px;
    padding: 9px 12px;
    flex: 1;
  }

  .today-btn {
    background: var(--accent-light);
    border: 1px solid transparent;
    color: var(--accent);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 9px 14px;
    border-radius: 10px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .today-btn:hover { background: var(--accent); color: #fff; }

  .time-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }
  .time-block label {
    display: block;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  #startTime, #endTime {
    font-size: 20px;
    padding: 10px 12px;
    width: 100%;
  }

  .entry-note {
    font-size: 12px;
    color: var(--muted);
    min-height: 18px;
    margin-bottom: 14px;
    font-weight: 300;
    transition: color 0.2s;
  }
  .entry-note.valid { color: var(--pos); font-weight: 400; }
  .entry-note.warn  { color: var(--warn); font-weight: 400; }
  .entry-note.err   { color: var(--neg); font-weight: 400; }

  .save-btn {
    width: 100%;
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .save-btn:hover { background: var(--accent); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(45,106,79,0.25); }
  .save-btn:active { transform: translateY(0); box-shadow: none; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 24px 0 12px;
  }
  .section-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }
  .section-line { flex: 1; height: 1px; background: var(--border); }

  .log-list { display: flex; flex-direction: column; gap: 6px; }

  .log-entry {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 44px 1fr auto 28px;
    align-items: center;
    gap: 12px;
    box-shadow: var(--shadow);
    transition: border-color 0.15s, transform 0.1s;
    animation: fadeIn 0.2s ease;
  }
  .log-entry:hover { border-color: var(--border2); transform: translateY(-1px); }
  .log-entry.is-today { border-left: 3px solid var(--accent); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .log-day { text-align: center; }
  .log-day-num {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    line-height: 1;
  }
  .log-day-name {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--faint);
    margin-top: 1px;
  }

  .log-times {
    font-size: 13px;
    color: var(--text);
  }
  .log-times span { color: var(--faint); margin: 0 3px; }
  .log-meta {
    font-size: 11px;
    color: var(--muted);
    font-weight: 300;
    margin-top: 2px;
  }
  .log-running {
    font-size: 10px;
    font-weight: 500;
    margin-top: 2px;
  }
  .log-running.pos { color: var(--pos); }
  .log-running.neg { color: var(--neg); }

  .log-delta {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 600;
    text-align: right;
  }
  .log-delta.pos { color: var(--pos); }
  .log-delta.neg { color: var(--neg); }

  .log-delete {
    background: none;
    border: none;
    color: var(--faint);
    cursor: pointer;
    font-size: 13px;
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .log-delete:hover { background: #fdf0f0; color: var(--neg); }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--faint);
    font-size: 13px;
    font-weight: 300;
  }
  .empty-icon { font-size: 28px; margin-bottom: 10px; opacity: 0.4; }

  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    border-radius: 30px;
    padding: 10px 22px;
    font-size: 13px;
    font-weight: 400;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
    z-index: 999;
    pointer-events: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    background: var(--text);
    color: var(--bg);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.ok   { background: var(--accent); }
  .toast.err-t{ background: var(--neg); }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">timbre<span class="logo-dot">.</span></div>
    <div class="month-nav">
      <button id="prevMonth">&#8592;</button>
      <div id="monthLabel"></div>
      <button id="nextMonth">&#8594;</button>
    </div>
  </header>

  <div class="balance-card" id="balanceCard">
    <div class="balance-label">Monthly balance</div>
    <div class="balance-value" id="balanceVal">+0:00</div>
    <div class="balance-sub" id="balanceSub">0 days logged</div>
  </div>

  <div class="card">
    <div class="card-label">Log entry</div>
    <div class="date-row">
      <input type="date" id="entryDate">
      <button class="today-btn" id="todayBtn">Today</button>
    </div>
    <div class="time-row">
      <div class="time-block">
        <label>Start</label>
        <input type="time" id="startTime" value="09:00">
      </div>
      <div class="time-block">
        <label>End</label>
        <input type="time" id="endTime" value="17:20">
      </div>
    </div>
    <div class="entry-note" id="entryNote">Enter start and end time</div>
    <button class="save-btn" id="saveBtn">Save entry</button>
  </div>

  <div class="section-header">
    <div class="section-title" id="logLabel">This month</div>
    <div class="section-line"></div>
  </div>
  <div class="log-list" id="logList"></div>

</div>

<div class="toast" id="toast"></div>

<script>
const DAILY = 500;
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

let currentYear, currentMonth;
let entries = {};

function init() {
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth();
  loadData();
  setDate(formatDate(now));
  setupListeners();
  render();
}

function formatDate(d) { return d.toISOString().slice(0, 10); }
function today() { return formatDate(new Date()); }

function loadData() {
  try { const r = localStorage.getItem('timbre_entries'); if (r) entries = JSON.parse(r); } catch(e) { entries = {}; }
}
function saveData() { localStorage.setItem('timbre_entries', JSON.stringify(entries)); }

function setDate(val) {
  document.getElementById('entryDate').value = val;
  if (entries[val]) {
    document.getElementById('startTime').value = entries[val].start;
    document.getElementById('endTime').value = entries[val].end;
  }
  updateNote();
}

function setupListeners() {
  document.getElementById('todayBtn').addEventListener('click', () => setDate(today()));
  document.getElementById('entryDate').addEventListener('change', e => {
    if (entries[e.target.value]) {
      document.getElementById('startTime').value = entries[e.target.value].start;
      document.getElementById('endTime').value = entries[e.target.value].end;
    }
    updateNote();
  });
  document.getElementById('startTime').addEventListener('input', updateNote);
  document.getElementById('endTime').addEventListener('input', updateNote);
  document.getElementById('saveBtn').addEventListener('click', saveEntry);
  document.getElementById('prevMonth').addEventListener('click', () => {
    currentMonth--; if (currentMonth < 0) { currentMonth = 11; currentYear--; } render();
  });
  document.getElementById('nextMonth').addEventListener('click', () => {
    currentMonth++; if (currentMonth > 11) { currentMonth = 0; currentYear++; } render();
  });
}

function parseTime(t) { const [h,m] = t.split(':').map(Number); return h*60+m; }
function fmtMinutes(mins) {
  const sign = mins < 0 ? '−' : '+';
  const abs = Math.abs(mins);
  return `${sign}${Math.floor(abs/60)}:${String(abs%60).padStart(2,'0')}`;
}
function fmtDuration(mins) {
  return `${Math.floor(mins/60)}h ${String(mins%60).padStart(2,'0')}m`;
}

function updateNote() {
  const start = document.getElementById('startTime').value;
  const end = document.getElementById('endTime').value;
  const note = document.getElementById('entryNote');
  if (!start || !end) { note.textContent = 'Enter start and end time'; note.className = 'entry-note'; return; }
  const s = parseTime(start), e = parseTime(end);
  if (e <= s) { note.textContent = 'End time must be after start'; note.className = 'entry-note err'; return; }
  if (s < 8*60 || s > 10*60) { note.textContent = '⚠ Start is outside 08:00–10:00 window'; note.className = 'entry-note warn'; return; }
  const worked = e - s;
  const delta = worked - DAILY;
  note.textContent = `${fmtDuration(worked)} worked · ${fmtMinutes(delta)} today`;
  note.className = 'entry-note ' + (delta >= 0 ? 'valid' : 'err');
}

function saveEntry() {
  const date = document.getElementById('entryDate').value;
  const start = document.getElementById('startTime').value;
  const end = document.getElementById('endTime').value;
  if (!date || !start || !end) { showToast('Please fill all fields', 'err-t'); return; }
  if (parseTime(end) <= parseTime(start)) { showToast('End must be after start', 'err-t'); return; }
  const isEdit = !!entries[date];
  entries[date] = { start, end };
  saveData();
  const [y, mo] = date.split('-').map(Number);
  currentYear = y; currentMonth = mo - 1;
  render();
  showToast(isEdit ? 'Entry updated' : 'Entry saved', 'ok');
}

function deleteEntry(date) {
  delete entries[date]; saveData(); render(); showToast('Entry removed', '');
}

function render() { renderHeader(); renderBalance(); renderLog(); }

function renderHeader() {
  document.getElementById('monthLabel').textContent = MONTHS[currentMonth].slice(0,3) + ' ' + currentYear;
}

function getMonthEntries() {
  const prefix = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
  return Object.entries(entries).filter(([k]) => k.startsWith(prefix)).sort(([a],[b]) => a.localeCompare(b));
}

function renderBalance() {
  const me = getMonthEntries();
  let total = 0;
  me.forEach(([,v]) => { total += (parseTime(v.end) - parseTime(v.start)) - DAILY; });
  const el = document.getElementById('balanceVal');
  const card = document.getElementById('balanceCard');
  el.textContent = fmtMinutes(total);
  card.classList.toggle('neg-bg', total < 0);
  const days = me.length;
  document.getElementById('balanceSub').innerHTML =
    `${days} day${days!==1?'s':''} logged · ${fmtDuration(Math.abs(total))} ${total >= 0 ? 'ahead' : 'behind'}`;
}

function renderLog() {
  const list = document.getElementById('logList');
  const me = getMonthEntries();
  document.getElementById('logLabel').textContent = `${MONTHS[currentMonth]} ${currentYear}`;

  if (me.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">○</div>No entries yet for this month</div>`;
    return;
  }

  let running = 0;
  const withR = me.map(([date, v]) => {
    const worked = parseTime(v.end) - parseTime(v.start);
    const delta = worked - DAILY;
    running += delta;
    return { date, v, worked, delta, running };
  });
  withR.reverse();

  list.innerHTML = '';
  const todayStr = today();

  withR.forEach(({ date, v, worked, delta, running }) => {
    const d = new Date(date + 'T00:00:00');
    const el = document.createElement('div');
    el.className = 'log-entry' + (date === todayStr ? ' is-today' : '');
    const rClass = running >= 0 ? 'pos' : 'neg';
    const dClass = delta >= 0 ? 'pos' : 'neg';
    el.innerHTML = `
      <div class="log-day">
        <div class="log-day-num">${String(d.getDate()).padStart(2,'0')}</div>
        <div class="log-day-name">${DAYS[d.getDay()]}</div>
      </div>
      <div class="log-info">
        <div class="log-times">${v.start}<span>→</span>${v.end}</div>
        <div class="log-meta">${fmtDuration(worked)}</div>
        <div class="log-running ${rClass}">running ${fmtMinutes(running)}</div>
      </div>
      <div class="log-delta ${dClass}">${fmtMinutes(delta)}</div>
      <button class="log-delete" data-date="${date}" title="Delete">✕</button>
    `;
    list.appendChild(el);
  });

  list.querySelectorAll('.log-delete').forEach(btn => {
    btn.addEventListener('click', e => {
      if (confirm(`Delete entry for ${e.currentTarget.dataset.date}?`)) deleteEntry(e.currentTarget.dataset.date);
    });
  });
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
  void t.offsetWidth;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

init();
</script>
</body>
</html>
